<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>持ち物チェックリスト</title>
    <link rel="stylesheet" href="assets/css/checklist.css">
</head>
<body>

<div class="container">

    <a href="main.html" class="back-button">← トップに戻る</a>

    <h1 class="title">持ち物チェックリスト</h1>

    <div class="checklist">

        <label class="check-item">
            <input type="checkbox" data-id="ticket">
            <span>チケット（近鉄・入場券）</span>
        </label>

        <label class="check-item">
            <input type="checkbox" data-id="wallet">
            <span>財布・現金・カード</span>
        </label>

        <label class="check-item">
            <input type="checkbox" data-id="phone">
            <span>スマホ・充電器</span>
        </label>

        <label class="check-item">
            <input type="checkbox" data-id="clothes">
            <span>着替え</span>
        </label>

        <label class="check-item">
            <input type="checkbox" data-id="medicine">
            <span>常備薬</span>
        </label>

        <label class="check-item">
            <input type="checkbox" data-id="towel">
            <span>タオル・ハンカチ</span>
        </label>

        <label class="check-item">
            <input type="checkbox" data-id="toiletries">
            <span>洗面用具</span>
        </label>

        <label class="check-item">
            <input type="checkbox" data-id="camera">
            <span>カメラ</span>
        </label>

    </div>

</div>

<script src="assets/js/items.js"></script>
</body>
</html>
