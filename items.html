<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>持ち物リスト</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="glass-header">
  <h1 class="title">🎒 持ち物リスト</h1>
  <p class="subtitle">チェックすると自動保存されます</p>
</header>

<main>

  <section class="card fadein">
    <h2>基本アイテム</h2>
    <ul class="item-list">
      <li><label><input type="checkbox" data-id="towel"> タオル</label></li>
      <li><label><input type="checkbox" data-id="swimwear"> 水着</label></li>
      <li><label><input type="checkbox" data-id="sandal"> サンダル</label></li>
      <li><label><input type="checkbox" data-id="clothes"> 着替え</label></li>
      <li><label><input type="checkbox" data-id="sunscreen"> 日焼け止め</label></li>
      <li><label><input type="checkbox" data-id="medicine"> 常備薬</label></li>
    </ul>
  </section>

  <section class="card fadein">
    <h2>海・プール関連</h2>
    <ul class="item-list">
      <li><label><input type="checkbox" data-id="goggles"> ゴーグル</label></li>
      <li><label><input type="checkbox" data-id="float"> 浮き輪</label></li>
      <li><label><input type="checkbox" data-id="beachsheet"> レジャーシート</label></li>
      <li><label><input type="checkbox" data-id="cooler"> クーラーボックス</label></li>
    </ul>
  </section>

  <section class="card fadein">
    <h2>その他</h2>
    <ul class="item-list">
      <li><label><input type="checkbox" data-id="wallet"> 財布</label></li>
      <li><label><input type="checkbox" data-id="phone"> スマホ</label></li>
      <li><label><input type="checkbox" data-id="charger"> 充電器</label></li>
      <li><label><input type="checkbox" data-id="camera"> カメラ</label></li>
    </ul>
  </section>

</main>

<script src="items.js"></script>
</body>
</html>
